<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="light" lang="en">

<head>
    <th:block th:replace="~{fragments/head :: head('Dashboard')}"></th:block>
</head>

<body class="bg-surface text-on-surface flex min-h-screen">
    <div class="layout-sidebar-slot">
        <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>
    </div>
    <main class="flex-1 flex flex-col min-w-0">
        <div class="layout-topnav-slot">
            <th:block th:replace="~{fragments/topnav :: topnav}"></th:block>
        </div>
        <!-- Dashboard content -->
        <div class="page-container space-y-6 sm:space-y-8">
            <!-- Portfolio header -->
            <section class="flex flex-col md:flex-row md:items-end justify-between gap-6">
                <div class="space-y-2">
                    <h2 class="text-on-surface-variant font-label text-sm font-semibold tracking-widest uppercase">
                        Portfolio Analysis</h2>
                    <h3 id="portfolio-total-value"
                        class="text-3xl sm:text-4xl font-black font-headline text-on-surface leading-tight">0€</h3>
                    <div class="flex items-center gap-2">
                        <span id="portfolio-total-return"
                            class="bg-tertiary-fixed text-on-tertiary-fixed px-3 py-1 rounded-full text-xs font-bold tracking-tight">0,00%
                            Total Return</span>
                    </div>
                </div>
            </section>

            <!-- Performance chart -->
            <section class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-8 bg-surface-container-lowest rounded-xl p-5 sm:p-8 relative group">
                    <div class="flex flex-col sm:flex-row justify-between items-start gap-2 mb-8">
                        <div>
                            <h4 class="text-lg font-bold font-headline">Portfolio Development</h4>
                        </div>
                        <div class="flex flex-col items-end gap-2 sm:-mt-4 sm:-mr-4">
                            <div class="flex bg-surface-container-low p-1 rounded-lg overflow-x-auto whitespace-nowrap"
                                data-time-range-group>
                                <button
                                    class="px-3 py-1 text-xs font-bold text-on-surface-variant hover:text-on-surface transition-colors"
                                    data-time-range>1D</button>
                                <button
                                    class="px-3 py-1 text-xs font-bold text-on-surface-variant hover:text-on-surface transition-colors"
                                    data-time-range>1W</button>
                                <button
                                    class="px-3 py-1 text-xs font-bold text-on-surface-variant hover:text-on-surface transition-colors"
                                    data-time-range>1M</button>
                                <button
                                    class="px-3 py-1 text-xs font-bold text-on-surface-variant hover:text-on-surface transition-colors"
                                    data-time-range>3M</button>
                                <button
                                    class="px-3 py-1 text-xs font-bold text-on-surface-variant hover:text-on-surface transition-colors"
                                    data-time-range>1Y</button>
                                <button
                                    class="px-3 py-1 text-xs font-bold bg-surface-container-lowest shadow-sm text-primary rounded-md"
                                    data-time-range>5Y</button>
                            </div>
                            <div class="hidden sm:flex gap-4">
                                <div class="flex items-center gap-2">
                                    <span class="w-3 h-3 rounded-full bg-primary-container"></span>
                                    <span class="text-xs font-semibold text-on-surface-variant">Asset Value</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="w-3 h-3 rounded-full bg-secondary-fixed-dim"></span>
                                    <span class="text-xs font-semibold text-on-surface-variant">ECB Benchmark</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="chart-wrap" class="chart-svg-wrap">
                        <div id="chart-y-axis-left"
                            class="absolute left-0 sm:left-2 top-0 bottom-0 pointer-events-none w-24 z-10">
                            <!-- Dynamic y-axis labels -->
                        </div>
                        <svg id="chart-svg" class="w-full h-full" viewBox="0 0 1000 300" preserveAspectRatio="none">
                            <defs>
                                <linearGradient id="gradient-primary" x1="0%" x2="100%" y1="0%" y2="0%">
                                    <stop offset="0%" stop-color="#607cec"></stop>
                                    <stop offset="100%" stop-color="#001453"></stop>
                                </linearGradient>
                            </defs>
                            <!-- Dynamic grid lines -->
                            <g id="chart-grid-lines"></g>
                            <!-- Hover guide line -->
                            <line id="chart-hover-line" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 2" class="text-outline-variant/20 opacity-0" x1="0" x2="0" y1="0" y2="300"></line>
                            <!-- Zero baseline -->
                            <line id="chart-zero-line" stroke="currentColor" stroke-width="1.2"
                                class="text-on-surface dark:text-slate-400" x1="0" x2="1000" y1="150" y2="150"></line>
                            <path id="chart-ecb-path" d="M0,150 L1000,150" fill="none" stroke="currentColor"
                                class="text-slate-400 dark:text-slate-600" stroke-dasharray="8 4" stroke-width="3">
                            </path>
                            <path id="chart-asset-path" d="M0,150 L1000,150" fill="none" stroke="#607cec"
                                stroke-linecap="round" stroke-linejoin="round" stroke-width="4"></path>
                        </svg>
                        <div id="chart-tooltip"
                            class="absolute pointer-events-none opacity-0 transition-opacity duration-100 bg-surface-container-lowest/90 backdrop-blur-xl border border-outline-variant/20 p-4 rounded-lg shadow-xl z-50 min-w-[9rem]">
                            <p id="chart-tooltip-date"
                                class="text-xs font-bold text-on-surface-variant uppercase tracking-tighter"></p>
                            <p id="chart-tooltip-value" class="text-sm font-bold text-on-surface mt-1"></p>
                            <p id="chart-tooltip-change" class="text-xs font-bold text-tertiary-fixed-dim"></p>
                        </div>
                    </div>
                    <div class="flex justify-between mt-4 px-2">
                        <span id="chart-label-0" class="text-xs font-bold text-on-surface uppercase">-</span>
                        <span id="chart-label-1" class="text-xs font-bold text-on-surface uppercase">-</span>
                        <span id="chart-label-2" class="text-xs font-bold text-on-surface uppercase">-</span>
                        <span id="chart-label-3" class="text-xs font-bold text-on-surface uppercase">-</span>
                        <span id="chart-label-4" class="text-xs font-bold text-on-surface uppercase">-</span>
                    </div>
                </div>
                <div class="lg:col-span-4 flex flex-col gap-6">
                    <div
                        class="bg-surface-container-low rounded-xl p-6 flex-1 flex flex-col items-center justify-center text-center">
                        <div>
                            <p class="text-xs font-bold text-on-surface-variant tracking-widest uppercase">Return</p>
                            <h5 id="annualized-return" class="text-3xl font-extrabold font-headline mt-2">0,00%</h5>
                            <p id="time-period-label" class="text-[10px] text-on-surface-variant mt-1">5 Years</p>
                        </div>
                    </div>
                    <div
                        class="bg-surface-container-low rounded-xl p-6 flex-1 flex flex-col items-center justify-center text-center">
                        <div>
                            <p class="text-xs font-bold text-on-surface-variant tracking-widest uppercase">ECB
                                Delta</p>
                            <h5 id="ecb-comparison-value" class="text-3xl font-extrabold font-headline mt-2">0,00%</h5>
                            <p id="ecb-rate-label" class="text-[10px] text-on-surface-variant mt-1">Relative to ECB Benchmark
                                (0,00%)</p>
                        </div>
                    </div>
                </div>
            </section>
            <section class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- Recent activity -->
                <div class="lg:col-span-8 bg-surface-container-lowest rounded-xl p-5 sm:p-8 flex flex-col">
                    <h4 class="text-lg font-bold font-headline mb-6">Recent Activity</h4>
                    <div id="dashboard-activity-list" class="space-y-6 flex-1">
                        <p class="text-sm text-on-surface-variant">No recent activities.</p>
                    </div>
                    <button onclick="window.location.href='/transaction'"
                        class="w-full mt-8 py-3 border border-outline-variant/30 text-xs font-bold uppercase tracking-widest rounded-lg hover:bg-surface-container-low transition-colors cursor-pointer">
                        All Transactions
                    </button>
                </div>

                <!-- Asset allocation -->
                <div class="lg:col-span-4 bg-surface-container-lowest rounded-xl p-5 sm:p-8 flex flex-col">
                    <h3 class="text-xl font-bold font-headline mb-6">Asset Allocation</h3>
                    <div class="flex-1 flex items-center justify-center relative py-4">
                        <div class="relative w-48 h-48">
                            <div id="alloc-donut" class="w-48 h-48 rounded-full"
                                style="background: conic-gradient(#607cec 0deg 360deg);"></div>
                            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                                <div
                                    class="w-32 h-32 rounded-full bg-surface-container-lowest flex flex-col items-center justify-center text-center px-2">
                                    <p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-tighter">
                                        Total</p>
                                    <p id="alloc-center-total" class="text-lg font-black leading-tight">—</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="mt-6 space-y-3">
                        <div class="flex justify-between items-center text-sm">
                            <span class="flex items-center gap-2"><span class="w-2 h-2 rounded-full"
                                    style="background:#607cec"></span>Stocks</span>
                            <span id="alloc-stocks-pct" class="font-bold">—</span>
                        </div>
                        <div class="flex justify-between items-center text-sm">
                            <span class="flex items-center gap-2"><span class="w-2 h-2 rounded-full"
                                    style="background:#4edea3"></span>Crypto</span>
                            <span id="alloc-crypto-pct" class="font-bold">—</span>
                        </div>
                    </div>
                </div>
            </section>
        </div>
        <th:block th:replace="~{fragments/add-asset :: addAssetModal}"></th:block>
    </main>
    <th:block th:replace="~{fragments/scripts :: layoutScripts}"></th:block>
    <script th:src="@{/scripts/dashboard/utils.js}"></script>
    <script th:src="@{/scripts/dashboard/tooltip.js}"></script>
    <script th:src="@{/scripts/dashboard/summary.js}"></script>
    <script th:src="@{/scripts/dashboard/chart.js}"></script>
    <script th:src="@{/scripts/dashboard/activities.js}"></script>
    <script th:src="@{/scripts/dashboard/market.js}"></script>
    <script th:src="@{/scripts/dashboard/init.js}"></script>
    <th:block th:replace="~{fragments/add-asset :: addAssetScripts}"></th:block>
</body>

</html>
