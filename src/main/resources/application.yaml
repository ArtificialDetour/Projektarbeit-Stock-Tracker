# Base application settings.
spring:
  application:
    name: stock-tracker
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  # Database settings.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/stock_tracker}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  # JPA settings.
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  # Template settings.
  thymeleaf:
    cache: false
  # Default security user.
  security:
    user:
      name: ${SPRING_SECURITY_USER_NAME:admin}
      password: ${SPRING_SECURITY_USER_PASSWORD:password}

# Server settings.
server:
  forward-headers-strategy: framework
  tomcat:
    use-relative-redirects: true

# Logging levels.
logging:
  level:
    root: INFO
    com.project: DEBUG
    org.springframework.security: DEBUG
