<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta th:content="${_csrf.token}" name="_csrf" />
    <meta th:content="${_csrf.headerName}" name="_csrf_header" />
    <title th:text="${pageTitle != null} ? ${pageTitle} + ' | Aktien-Tracking' : 'Aktien-Tracking'">Aktien-Tracking</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-low": "#f2f4f6",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#173bab",
                        "on-tertiary-fixed-variant": "#005236",
                        "on-primary-fixed": "#001453",
                        "tertiary-fixed": "#6ffbbe",
                        "inverse-primary": "#b8c4ff",
                        "on-surface": "#191c1e",
                        "secondary-fixed-dim": "#b7c8e1",
                        "surface-container-high": "#e6e8ea",
                        "on-tertiary-fixed": "#002113",
                        "secondary": "#505f76",
                        "on-secondary-fixed": "#0b1c30",
                        "primary": "#000000",
                        "on-primary-container": "#607cec",
                        "outline-variant": "#c6c6cd",
                        "on-error-container": "#93000a",
                        "surface-tint": "#3755c3",
                        "tertiary-fixed-dim": "#4edea3",
                        "surface-dim": "#d8dadc",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "on-secondary-fixed-variant": "#38485d",
                        "secondary-container": "#d0e1fb",
                        "surface-container": "#eceef0",
                        "tertiary": "#000000",
                        "surface": "#f7f9fb",
                        "surface-container-highest": "#e0e3e5",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2d3133",
                        "on-background": "#191c1e",
                        "tertiary-container": "#002113",
                        "surface-variant": "#e0e3e5",
                        "on-tertiary-container": "#009668",
                        "primary-fixed": "#dde1ff",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#eff1f3",
                        "secondary-fixed": "#d3e4fe",
                        "primary-fixed-dim": "#b8c4ff",
                        "surface-bright": "#f7f9fb",
                        "background": "#f7f9fb",
                        "primary-container": "#001453",
                        "on-surface-variant": "#45464d",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-secondary-container": "#54647a",
                        "outline": "#76777d"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <link th:href="@{/styles/shared.css}" rel="stylesheet" />
    <!-- Page head extension -->
    <th:block th:replace="${headContent} ?: ~{}"></th:block>
</head>

<body class="bg-surface text-on-surface flex min-h-screen" th:classappend="${bodyClass}">

    <!-- Sidebar slot -->
    <div class="layout-sidebar-slot">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    </div>

    <main class="flex-1 flex flex-col min-w-0 overflow-x-hidden">
        <!-- Top navigation slot -->
        <div class="layout-topnav-slot">
            <div th:replace="~{fragments/topnav :: topnav}"></div>
        </div>

        <!-- Page content -->
        <th:block th:replace="${content}"></th:block>
    </main>

    <!-- Page scripts -->
    <th:block th:replace="~{fragments/scripts :: layoutScripts}"></th:block>
    <th:block th:replace="${scripts} ?: ~{}"></th:block>
</body>

</html>
