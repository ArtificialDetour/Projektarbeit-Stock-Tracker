<!-- Sidebar fragment -->
<aside th:fragment="sidebar" class="flex flex-col h-full sticky top-0 bg-slate-100 dark:bg-slate-900 h-screen w-64 border-r-0 z-50 overflow-y-auto">
    <!-- Sidebar header -->
    <div class="h-16 px-6 md:px-8 flex items-center justify-between">
        <a class="flex items-center gap-2.5" th:href="@{/dashboard}" aria-label="Aktien-Tracking Startseite">
            <div class="w-8 h-8 bg-on-primary-container rounded-lg flex items-center justify-center text-white shrink-0">
                <span class="material-symbols-outlined text-xl">analytics</span>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white font-manrope">Aktien-Tracking</h1>
        </a>
        <button class="lg:hidden rounded-lg p-1.5 hover:bg-slate-200 dark:hover:bg-slate-800"
            id="mobile-sidebar-close" type="button" aria-label="Close navigation menu">
            <span class="material-symbols-outlined text-slate-700 dark:text-slate-300">close</span>
        </button>
    </div>
    <!-- Primary navigation -->
    <nav class="flex-1 px-4 space-y-1">
        <a th:href="@{/dashboard}" data-nav="dashboard"
            th:classappend="${activePage == 'dashboard'} ? 'text-blue-700 dark:text-blue-400 font-semibold border-r-2 border-blue-700 dark:border-blue-400 bg-white/50 dark:bg-white/5' : 'text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg'"
            class="sidebar-link flex items-center px-4 py-3 transition-colors group">
            <span class="material-symbols-outlined mr-3" data-icon="dashboard">dashboard</span>
            <span class="font-inter font-medium">Dashboard</span>
        </a>
        <a th:href="@{/portfolio}" data-nav="portfolio"
            th:classappend="${activePage == 'portfolio'} ? 'text-blue-700 dark:text-blue-400 font-semibold border-r-2 border-blue-700 dark:border-blue-400 bg-white/50 dark:bg-white/5' : 'text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg'"
            class="sidebar-link flex items-center px-4 py-3 transition-colors group">
            <span class="material-symbols-outlined mr-3" data-icon="account_balance_wallet">account_balance_wallet</span>
            <span class="font-inter font-medium">Portfolio</span>
        </a>
        <a th:href="@{/transaction}" data-nav="transaction"
            th:classappend="${activePage == 'transaction'} ? 'text-blue-700 dark:text-blue-400 font-semibold border-r-2 border-blue-700 dark:border-blue-400 bg-white/50 dark:bg-white/5' : 'text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg'"
            class="sidebar-link flex items-center px-4 py-3 transition-colors group">
            <span class="material-symbols-outlined mr-3" data-icon="receipt_long">receipt_long</span>
            <span class="font-inter font-medium">Transactions</span>
        </a>
        <a th:href="@{/automation}" data-nav="automation"
            th:classappend="${activePage == 'automation'} ? 'text-blue-700 dark:text-blue-400 font-semibold border-r-2 border-blue-700 dark:border-blue-400 bg-white/50 dark:bg-white/5' : 'text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg'"
            class="sidebar-link flex items-center px-4 py-3 transition-colors group">
            <span class="material-symbols-outlined mr-3" data-icon="settings_input_component">settings_input_component</span>
            <span class="font-inter font-medium">Automation</span>
        </a>
    </nav>
    <!-- Add asset action -->
    <div class="px-6 py-6 mt-2 border-t border-slate-200 dark:border-slate-800">
        <button data-add-asset
            th:classappend="${activePage == 'settings' or activePage == 'automation'} ? 'opacity-40 cursor-not-allowed pointer-events-none' : 'shadow-lg transition-transform duration-150 active:scale-95'"
            class="w-full py-3 bg-gradient-to-r from-on-primary-container to-primary-container text-white rounded-lg font-bold flex items-center justify-center space-x-2">
            <span class="material-symbols-outlined text-sm" data-icon="add">add</span>
            <span class="font-manrope text-sm">Add Asset</span>
        </button>
    </div>
    <!-- Secondary navigation -->
    <div class="px-4 pb-8 pt-2 space-y-1">
        <a th:href="@{/settings}" data-nav="settings"
            th:classappend="${activePage == 'settings'} ? 'text-blue-700 dark:text-blue-400 font-semibold border-r-2 border-blue-700 dark:border-blue-400 bg-white/50 dark:bg-white/5' : 'text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg'"
            class="sidebar-link flex items-center px-4 py-2 transition-colors">
            <span class="material-symbols-outlined mr-3 text-sm" data-icon="settings">settings</span>
            <span class="text-sm font-inter">Settings</span>
        </a>
    </div>
</aside>
